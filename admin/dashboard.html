<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Navron Labs Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#050816">
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="admin-body" data-admin-page="dashboard" data-admin-protected="true">
    <div class="admin-layout">
        <aside class="admin-sidebar" aria-label="Admin navigation">
            <a href="../index.html" class="admin-brand"><img src="../assets/logo/logo-icon.png" alt=""><span>Navron Labs</span></a>
            <nav class="admin-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="services.html">Services</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="leads.html">Leads</a>
                <a href="team.html">Team</a>
                <a href="testimonials.html">Testimonials</a>
                <a href="settings.html">Settings</a>
            </nav>
            <div class="admin-sidebar-footer">
                <div class="admin-user"><span>Signed in as</span><strong data-admin-email>Admin</strong></div>
                <button class="admin-btn admin-btn-danger" type="button" data-admin-logout>Logout</button>
            </div>
        </aside>
        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-page-title">
                    <h1>Dashboard</h1>
                    <p>Realtime overview of the Navron Labs CMS collections.</p>
                </div>
            </div>
            <section class="admin-grid" data-dashboard-stats>
                <div class="admin-loading"><span class="admin-spinner"></span><span>Loading dashboard...</span></div>
            </section>
        </main>
    </div>
    <div class="admin-toast-region" data-toast-region aria-live="polite"></div>
    <script type="module" src="../assets/js/admin.js"></script>
</body>
</html>
